<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VideoTube</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<!-- HEADER -->
<header>

<div class="logo">
<i class="fa-solid fa-play"></i>
<span>VideoTube</span>
</div>

<div class="header-menu">

<div class="search-box">

<input type="text" id="searchInput" placeholder="Cari video...">

<i class="fa-solid fa-magnifying-glass" id="searchBtn"></i>

</div>

<i class="fa-regular fa-bell"></i>

</div>

</header>

<!-- KATEGORI -->

<div class="categories">

<button class="active">Semua</button>

<button>Musik</button>

<button>Game</button>

<button>Film</button>

<button>Teknologi</button>

<button>Olahraga</button>

<button>Berita</button>

<button>Live</button>

<button>Podcast</button>

</div>

<!-- BANNER -->

<section class="banner">

<img src="https://picsum.photos/900/400" alt="Banner">

</section>

<!-- VIDEO LIST -->
<section class="videos">

<a href="watch.html?video=video1.mp4" class="video-link">
    <div class="video-card">

        <div class="thumb">
            <img src="https://picsum.photos/600/340?1" alt="Video 1">
            <span class="duration">12:45</span>
        </div>

        <div class="video-info">

            <img class="channel-photo"
            src="https://picsum.photos/60?1"
            alt="Channel">

            <div class="video-text">
                <h3>Video Pertama</h3>
                <p>VideoTube • 15 rb x ditonton • 1 hari lalu</p>
            </div>

            <i class="fa-solid fa-ellipsis-vertical"></i>

        </div>

    </div>
</a>

<a href="watch.html?video=video2.mp4" class="video-link">
    <div class="video-card">

        <div class="thumb">
            <img src="https://picsum.photos/600/340?2" alt="Video 2">
            <span class="duration">08:30</span>
        </div>

        <div class="video-info">

            <img class="channel-photo"
            src="https://picsum.photos/60?2"
            alt="Channel">

            <div class="video-text">
                <h3>Video Kedua</h3>
                <p>VideoTube • 7 rb x ditonton • 3 hari lalu</p>
            </div>

            <i class="fa-solid fa-ellipsis-vertical"></i>

        </div>

    </div>
</a>

<a href="watch.html?video=video3.mp4" class="video-link">
    <div class="video-card">

        <div class="thumb">
            <img src="https://picsum.photos/600/340?3" alt="Video 3">
            <span class="duration">15:10</span>
        </div>

        <div class="video-info">

            <img class="channel-photo"
            src="https://picsum.photos/60?3"
            alt="Channel">

            <div class="video-text">
                <h3>Video Ketiga</h3>
                <p>VideoTube • 20 rb x ditonton • 1 minggu lalu</p>
            </div>

            <i class="fa-solid fa-ellipsis-vertical"></i>

        </div>

    </div>
</a>

</section>

<!-- BOTTOM MENU -->

<nav class="bottom-nav">

<a href="#">
<i class="fa-solid fa-house"></i>
<span>Beranda</span>
</a>

<a href="#">
<i class="fa-solid fa-film"></i>
<span>Shorts</span>
</a>

<a href="#">
<i class="fa-solid fa-plus"></i>
</a>

<a href="#">
<i class="fa-regular fa-circle-play"></i>
<span>Video</span>
</a>

<a href="#">
<i class="fa-regular fa-user"></i>
<span>Akun</span>
</a>

</nav>

<script src="script.js"></script>

</body>
</html>
